<!DOCTYPE html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bar Gestionale</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f97316">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bar Gestionale">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="style_supplement.css">
  <style>
    @media print {
      #sidebar, #menu-toggle, #sidebar-backdrop, .page-header .btn,
      .btn-pay, .btn-danger, .btn-success, .btn-ghost, nav { display: none !important; }
      #main { margin-left: 0 !important; width: 100% !important; }
      #receipt-print { display: block !important; }
    }
    #receipt-print { display: none; }
  </style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M8 3v4M16 3v4M3 9h18M5 7h14a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2z"/>
      </svg>
      <span class="logo-text">Bar Gestionale</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#tavoli" class="nav-item" data-view="tavoli">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="16" height="10" rx="1.5"/><path d="M6 7V5a4 4 0 0 1 8 0v2"/><path d="M10 11v3"/></svg>
        Tavoli
      </a>
      <a href="#pos" class="nav-item" data-view="pos">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="4" width="16" height="13" rx="1.5"/><path d="M6 9h8M6 12h5"/></svg>
        Comanda / POS
      </a>
      <a href="#menu" class="nav-item" data-view="menu">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 5h12M4 9h8M4 13h10"/></svg>
        Menu & Ricette
      </a>
      <a href="#ingredienti" class="nav-item" data-view="ingredienti">
        <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="10" cy="10" r="7"/><path d="M10 7v3l2 2"/></svg>
        Ingredienti
      </a>
    </nav>
    <div class="sidebar-footer">
      <button class="theme-toggle" data-theme-toggle title="Cambia tema">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="10" cy="10" r="4"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.9 4.9l1.4 1.4M13.7 13.7l1.4 1.4M4.9 15.1l1.4-1.4M13.7 6.3l1.4-1.4"/></svg>
      </button>
      <span class="sidebar-version">v1.0-offline</span>
    </div>
  </aside>
  <main id="main">
    <div id="view-container"></div>
  </main>
</div>
<div id="toast-container"></div>
<div id="receipt-print"></div>

<!-- sql.js: SQLite compilato in WebAssembly -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>

<!-- Layer DB offline -->
<script src="db/schema.js"></script>
<script src="db/database.js"></script>
<script src="db/api.js"></script>

<!-- Views -->
<script src="views/tavoli.js"></script>
<script src="views/pos.js"></script>
<script src="views/menu.js"></script>
<script src="views/ingredienti.js"></script>
<script src="views/magazzino.js"></script>
<script src="views/fornitori.js"></script>
<script src="views/storico.js"></script>
<script src="views/print.js"></script>

<!-- App core -->
<script src="app.js"></script>

<script>
  // Registra Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js').catch(console.error);
    });
  }
</script>
</body>
</html>
